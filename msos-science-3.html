<script>

const UNITS = [
  { id:'q1-sci-method', title:"Scientific Method", icon:'🔬', cc:'Q1 · Engineering & Tech', q:'Q1', desc:"Ask questions, form a hypothesis, test, and draw conclusions." },

  { id:'q2-simple-machines', title:"Simple Machines & Friction", icon:'🔧', cc:'Q2 · 3-PS2', q:'Q2', desc:"Levers, ramps, wheels, and pulleys. How friction affects motion." },
  { id:'q3-life-cycles', title:"Life Cycles", icon:'🦋', cc:'Q3 · 3-LS1', q:'Q3', desc:"How plants and animals grow, reproduce, and die." },
  { id:'q3-inherited-traits', title:"Inherited Traits", icon:'👨‍👩‍👧', cc:'Q3 · 3-LS3', q:'Q3', desc:"Traits passed from parents to offspring. Learned vs inherited." },
  { id:'q3-hawaiian-eco', title:"Hawaiian Ecosystems (Hawaiiana Unit)", icon:'🌺', cc:'Q3 · 3-LS2, 3-LS4', q:'Q3', desc:"Native Hawaiian plants and animals. Endemic species and their habitats." },
  { id:'q4-weather', title:"Weather Impacts", icon:'🌦️', cc:'Q4 · 3-ESS2, 3-ESS3', q:'Q4', desc:"Weather patterns, forecasting, storms, and how weather shapes our lives." },
];

const LESSONS = {
  "q1-sci-method": "<h2>🔬 Scientific Method</h2><h3>What is the Scientific Method?</h3><p>The scientific method is how scientists find answers to their questions. It has 6 steps.</p><h3>The 6 Steps</h3><ol><li><strong>Question:</strong> What do you want to find out?</li><li><strong>Hypothesis:</strong> A smart, testable prediction of what will happen.</li><li><strong>Materials:</strong> What do you need for the experiment?</li><li><strong>Procedure:</strong> Step-by-step plan.</li><li><strong>Data:</strong> Record everything you observe. Measurements, counts, notes.</li><li><strong>Conclusion:</strong> Look at your data. Did the hypothesis hold up?</li></ol><h3>Fair Tests</h3><p>Change ONE thing at a time. Keep everything else the same. Do MULTIPLE trials.</p><h3>Vocabulary</h3><ul><li><strong>Observation</strong> — what you notice with your senses</li><li><strong>Inference</strong> — an explanation based on observation</li><li><strong>Data</strong> — numbers or notes you record</li><li><strong>Variable</strong> — the thing you change</li></ul><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/balancing-act/latest/balancing-act_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">⚖️ Balancing Act →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Practice the scientific method: form a hypothesis about which side will tip, test it, and record your results.</p>",
  "q1-eng-design": "<h2>⚙️ Engineering Design &amp; Technology</h2><h3>What is Engineering?</h3><p>Engineering is designing solutions to problems using science and math.</p><h3>The Engineering Design Process (6 Steps)</h3><ol><li><strong>Ask:</strong> What is the problem?</li><li><strong>Imagine:</strong> Brainstorm many ideas.</li><li><strong>Plan:</strong> Choose the best idea. Sketch it.</li><li><strong>Create:</strong> Build the prototype.</li><li><strong>Test:</strong> Does it work?</li><li><strong>Improve:</strong> Fix weaknesses.</li></ol><h3>What is Technology?</h3><p>Technology is anything humans make to solve a problem. Not just phones — a pencil is technology, a spoon is technology, a chair is technology.</p><h3>Iteration = Improvement</h3><p>Engineers rarely get it right on the first try. Failure teaches lessons. Version 2 is always better.</p><h3>Real-World Examples</h3><p>Skyscrapers, airplanes, medicine, water systems, and toys — all designed by engineers.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/circuit-construction-kit-dc/latest/circuit-construction-kit-dc_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🔌 Circuit Construction Kit →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Design and test electrical circuits. Iterate to make bulbs brighter or motors spin faster — real engineering in action.</p>",
  "q2-forces-motion": "<h2>🏎️ Forces &amp; Motion</h2><h3>What is a Force?</h3><p>A FORCE is a push or a pull. Forces make things move, stop, or change direction.</p><h3>Motion</h3><p>MOTION is a change in position. If an object is not moving, it is at rest.</p><h3>Speed</h3><p>SPEED = how far / how long. Fast = covers more distance in the same time.</p><h3>Gravity</h3><p>GRAVITY is a pull toward the Earth. It's why things fall down. It's what keeps you on the ground.</p><h3>Magnets</h3><p>Magnets have a NORTH and SOUTH pole. Opposite poles ATTRACT. Same poles REPEL.</p><p>Magnets only pull certain metals: iron, steel, nickel, cobalt.</p><h3>Balanced &amp; Unbalanced Forces</h3><p>Balanced = forces cancel; object stays still. Unbalanced = one wins; object moves.</p><h3>Vocabulary</h3><ul><li><strong>Force</strong> — a push or a pull</li><li><strong>Motion</strong> — change in position</li><li><strong>Gravity</strong> — pull toward Earth</li><li><strong>Magnetism</strong> — attraction between magnets and certain metals</li></ul><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/forces-and-motion-basics/latest/forces-and-motion-basics_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🎯 Forces and Motion: Basics →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Play tug-of-war, push objects with different forces, and watch friction slow things down. Perfect for exploring balanced vs unbalanced forces.</p>",
  "q2-simple-machines": "<h2>🔧 Simple Machines &amp; Friction</h2><h3>Six Simple Machines</h3><ul><li><strong>Lever</strong> — a bar on a pivot (see-saw, crowbar)</li><li><strong>Wheel &amp; Axle</strong> — a wheel on a rod (car wheel, doorknob)</li><li><strong>Pulley</strong> — a wheel with a rope (flagpole)</li><li><strong>Inclined Plane</strong> — a ramp (wheelchair ramp)</li><li><strong>Wedge</strong> — a splitting tool (axe, knife)</li><li><strong>Screw</strong> — a twisted inclined plane (jar lid)</li></ul><h3>What Simple Machines Do</h3><p>Simple machines make work easier — they change the size or direction of a force.</p><h3>Friction</h3><p>FRICTION is a force that SLOWS moving objects when their surfaces rub. Rough surfaces have MORE friction. Smooth surfaces have LESS.</p><h3>Reducing Friction</h3><p>Oil, wax, or wheels reduce friction. Ice has almost no friction — that's why you slip.</p><h3>Increasing Friction</h3><p>Rubber tires, gripped shoes, and sandpaper INCREASE friction (helpful for grip and braking).</p><h3>🎮 Interactive Resources</h3><p><a href=\"https://edheads.org/game-page/simple-machines-interactive-educational-game/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#0f5132;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;margin-right:6px;margin-bottom:6px;\">🕹️ Edheads Simple Machines Game →</a> <a href=\"https://phet.colorado.edu/sims/html/balancing-act/latest/balancing-act_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;margin-right:6px;margin-bottom:6px;\">⚖️ PhET Balancing Act (Lever) →</a> <a href=\"https://phet.colorado.edu/sims/html/friction/latest/friction_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;margin-right:6px;margin-bottom:6px;\">🔥 PhET Friction →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Try Edheads to spot simple machines in a house. Use PhET Balancing Act as a lever exploration and PhET Friction to see how surfaces heat up as they rub.</p>",
  "q3-life-cycles": "<h2>🦋 Life Cycles</h2><h3>What is a Life Cycle?</h3><p>Every living thing has a LIFE CYCLE: the stages it goes through from birth to death.</p><h3>Butterfly Life Cycle (Complete Metamorphosis)</h3><p><strong>Egg → Caterpillar (larva) → Chrysalis (pupa) → Adult butterfly.</strong></p><p>Metamorphosis = big change in body shape.</p><h3>Frog Life Cycle</h3><p><strong>Egg → Tadpole → Froglet → Adult frog.</strong> Tadpoles live in water and breathe with gills. Adult frogs breathe with lungs.</p><h3>Chicken Life Cycle</h3><p><strong>Egg → Chick → Adult chicken.</strong> No metamorphosis — the chick just grows.</p><h3>Plant Life Cycle</h3><p><strong>Seed → Sprout → Plant → Flower → New seeds.</strong></p><h3>What Living Things Need</h3><p>Food, water, air, shelter, and space.</p>",
  "q3-inherited-traits": "<h2>👨‍👩‍👧 Inherited Traits</h2><h3>What is a Trait?</h3><p>A TRAIT is a feature of a living thing — its eye color, height, hair color, or leaf shape.</p><h3>Inherited vs Learned</h3><p><strong>INHERITED:</strong> Passed from parents to offspring. Examples: eye color, dimples, tongue-rolling.</p><p><strong>LEARNED:</strong> Not passed on. You have to learn them. Examples: riding a bike, reading, speaking Spanish.</p><h3>DNA &amp; Genes</h3><p>Instructions for inherited traits live in DNA, in every cell of your body. Genes are pieces of DNA.</p><h3>Traits in Plants</h3><p>Plants inherit traits too — flower color, leaf shape, height.</p><h3>Why Siblings Look Different</h3><p>Every child gets a different combination of genes from mom and dad. That's why siblings look similar but not identical.</p><h3>Vocabulary</h3><ul><li><strong>Trait</strong> — a feature of a living thing</li><li><strong>Inherited</strong> — passed from parents</li><li><strong>Learned</strong> — gained through practice or experience</li><li><strong>DNA</strong> — life’s instructions in every cell</li></ul><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/natural-selection/latest/natural-selection_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🐰 Natural Selection →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Watch how bunny fur color (an inherited trait) affects survival in different environments. See which traits get passed on.</p>",
  "q3-hawaiian-eco": "<h2>🌺 Hawaiian Ecosystems (Hawaiiana Unit)</h2><h3>Hawai‘i is Special</h3><p>Hawai‘i is the most isolated island chain on Earth. Many plants and animals here are ENDEMIC — found ONLY in Hawai‘i.</p><h3>Native Hawaiian Plants</h3><ul><li><strong>Koa</strong> — a large tree used for canoes and building</li><li><strong>ʻōhiʻa lehua</strong> — a flowering tree important to the forest</li><li><strong>Kukui</strong> — the state tree; oil for light and healing</li></ul><h3>Native Hawaiian Animals</h3><ul><li><strong>Nēnē</strong> (Hawaiian goose) — the state bird</li><li><strong>Honu</strong> (green sea turtle) — sacred; endangered</li><li><strong>Monk seal</strong> (ʻīlio holo i ka uaua) — critically endangered</li><li><strong>Honeycreepers</strong> — colorful native birds, many endangered</li></ul><h3>Threats to Native Species</h3><p>Invasive species (mongoose, cane toads, feral pigs), habitat loss, and climate change threaten native life.</p><h3>Malama ʻĀina</h3><p>Mālama ʻĀina means \"care for the land.\" Hawaiians have practiced sustainable land care for centuries.</p><h3>Ecosystems in Hawai‘i</h3><p>Reef · Rainforest · Coastal · Dry forest · Alpine (Mauna Kea)</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/natural-selection/latest/natural-selection_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🌿 Natural Selection →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Explore how species adapt to their environment. Try adding wolves as predators — mirrors how invasive species change Hawaiian ecosystems.</p>",
  "q4-weather": "<h2>🌦️ Weather Impacts</h2><h3>What is Weather?</h3><p>WEATHER is what's happening in the sky right now: temperature, wind, rain, sun, clouds. It changes every day.</p><h3>Weather vs Climate</h3><p>WEATHER = day-to-day. CLIMATE = the typical pattern over many years.</p><h3>Weather Tools</h3><ul><li><strong>Thermometer</strong> — temperature</li><li><strong>Rain gauge</strong> — rainfall</li><li><strong>Anemometer</strong> — wind speed</li><li><strong>Barometer</strong> — air pressure</li></ul><h3>The Water Cycle</h3><p>Evaporation → Condensation → Precipitation → Collection. The sun powers it.</p><h3>Clouds</h3><p><strong>Cumulus</strong> — fluffy, fair weather. <strong>Stratus</strong> — flat gray layers. <strong>Cirrus</strong> — thin, high, wispy.</p><h3>Storms</h3><p>Thunderstorms, hurricanes, tornadoes, blizzards. Each has different dangers.</p><h3>Weather in Hawai‘i</h3><p>Two seasons: kau (May-October, warm/dry) and hoʻoilo (November-April, cooler/wet). Trade winds are steady from the northeast.</p><h3>Staying Safe</h3><p>Watch forecasts. Have an emergency kit. Know evacuation routes.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/greenhouse-effect/latest/greenhouse-effect_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🌡️ The Greenhouse Effect →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Explore how the sun&#39;s energy warms Earth. Adjust greenhouse gases and watch the temperature change. Great intro to climate.</p>",
};

let currentUnit = null;
let lastQuizResults = null;

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = UNITS.map(u => `
    <div class="unit-card" onclick="showLesson('${u.id}')">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-cc">${u.q} · ${u.cc}</div>
      <div class="unit-title">${u.title}</div>
      <div class="unit-desc">${u.desc}</div>
    </div>
  `).join('');
  let sbHTML = '';
  let lastQ = '';
  const Q_LABELS = {
    'Q1': 'Q1 · Scientific Method, Engineering & Technology',
    'Q2': 'Q2 · Physical Science',
    'Q3': 'Q3 · Life Science',
    'Q4': 'Q4 · Earth & Space Science'
  };
  UNITS.forEach(u => {
    if (u.q !== lastQ) {
      sbHTML += `<div class="sidebar-quarter">${Q_LABELS[u.q] || u.q}</div>`;
      lastQ = u.q;
    }
    const done = completedUnits[u.id] ? 'completed' : '';
    sbHTML += `<div class="sidebar-unit ${done}" onclick="showLesson('${u.id}')">${u.icon} ${u.title}</div>`;
  });
  document.getElementById('sidebar-content').innerHTML = sbHTML;
  const done = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = done + '/' + UNITS.length;
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  renderHome();
}

function showLesson(uid) {
  currentUnit = uid;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  document.getElementById('lesson-content').innerHTML = LESSONS[uid] || '<p>Lesson coming soon.</p>';
}

function showLab() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lab-screen').classList.add('active');
  const l = LABS[currentUnit];
  if (!l) { document.getElementById('lab-content').innerHTML = '<p>Lab coming soon.</p>'; return; }
  let steps = l.steps.map(s => `<li>${s}</li>`).join('');
  let reflect = l.reflect.map(r => `<li>${r}</li>`).join('');
  document.getElementById('lab-content').innerHTML = `
    <div class="handout-card">
      <h3>${l.title}</h3>
      <div class="handout-mission">${l.mission}</div>
      <strong>Steps:</strong><ol class="handout-steps">${steps}</ol>
      <strong>Deliverable:</strong> ${l.deliverable}
      <div class="handout-reflect"><strong>Reflect:</strong><ol>${reflect}</ol></div>
    </div>`;
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit] || [];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit] || [];
  let html = '';
  ws.forEach((p, idx) => {
    const user = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${user || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const q = QUIZZES[currentUnit] || [];
  let html = '';
  q.forEach((qq, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${qq.q}</p>`;
    qq.opts.forEach((opt, i) => {
      html += `<label><input type="radio" name="q${idx}" value="${i}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

function submitQuiz() {
  const q = QUIZZES[currentUnit] || [];
  const name = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  const breakdown = [];
  q.forEach((qq, idx) => {
    const sel = document.querySelector(`input[name="q${idx}"]:checked`);
    const si = sel ? parseInt(sel.value) : -1;
    const ok = si === qq.ans;
    if (ok) score++;
    breakdown.push({ n: idx+1, question: qq.q, studentAnswer: si >= 0 ? qq.opts[si] : '(no answer)', correctAnswer: qq.opts[qq.ans], correct: ok });
  });
  const pct = Math.round((score / q.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === currentUnit);
  lastQuizResults = { studentName: name, unitTitle: unit ? unit.title : currentUnit, score, total: q.length, pct, breakdown };
  document.getElementById('cert-content').innerHTML = `
    <p style="font-size:1.1rem;margin:16px 0;"><strong>${name || 'Student'}</strong></p>
    <p>completed <strong>${unit ? unit.title : currentUnit}</strong></p>
    <p style="font-size:1.4rem;color:${pct >= 70 ? '#4a8c3a' : '#c62828'};margin:16px 0;"><strong>${score} / ${q.length} correct (${pct}%)</strong></p>`;
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const body = `Hello Mrs. Won,%0D%0A%0D%0A${r.studentName || 'A student'} completed the ${r.unitTitle} quiz.%0D%0A%0D%0AScore: ${r.score}/${r.total} (${r.pct}%%)%0D%0A%0D%0AThank you.`;
  window.location.href = `https://mail.google.com/mail/?view=cm&fs=1&tf=1&to=ewon@starofthesea.org&su=${encodeURIComponent(r.unitTitle + ' Quiz Result')}&body=${body}`;
}

renderHome();
</script>

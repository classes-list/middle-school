const LESSONS = {
  "place-value": "<h2>Understand Place Value</h2><p>Every digit in a number has a <strong>place value</strong> that tells its worth. Moving one place LEFT multiplies by 10; moving one place RIGHT divides by 10.</p><p><strong>Powers of 10:</strong> 10\u00b9 = 10, 10\u00b2 = 100, 10\u00b3 = 1,000. Multiplying by 10\u207f shifts every digit n places to the left.</p><p><strong>Decimals to thousandths:</strong> after the decimal point come tenths (1/10), hundredths (1/100), thousandths (1/1,000). Example: 3.472 = 3 + 0.4 + 0.07 + 0.002.</p><p><strong>Compare decimals:</strong> line up decimal points, compare digits left to right. 0.62 &gt; 0.6 because the tenths tie but hundredths 2 &gt; 0.</p><p><strong>Round decimals:</strong> find the target place, look at the digit to its right \u2014 5 or more, round up; less than 5, round down.</p><p><strong>Worked Example:</strong> Round 4.267 to the nearest tenth. Tenths digit is 2; digit to its right is 6 (\u2265 5), so round up: <strong>4.3</strong>.</p>",
  "add-sub-decimals": "<h2>Add &amp; Subtract Decimals</h2><p>To add or subtract decimals, <strong>line up the decimal points</strong>. Fill in zeros as placeholders if the numbers have different numbers of decimal places.</p><p><strong>Estimate first:</strong> round each decimal to the nearest whole number to check reasonableness.</p><p><strong>Worked Example:</strong> 12.4 + 3.75</p><pre>  12.40\n+  3.75\n-------\n  16.15</pre><p><strong>Subtracting:</strong> 8.3 \u2212 1.457. Rewrite 8.3 as 8.300 to line up. 8.300 \u2212 1.457 = <strong>6.843</strong>.</p><p><strong>Common mistake:</strong> forgetting to line up the decimal points. If you write the numbers right-justified, you'll add wrong digits together.</p>",
  "mult-whole": "<h2>Multiply Multi-Digit Whole Numbers</h2><p>To multiply a 3-digit number by a 2-digit number, multiply by each place of the smaller number and add the results.</p><p><strong>Estimate first:</strong> round each factor to the leading digit. 234 \u00d7 47 \u2248 200 \u00d7 50 = 10,000. Your answer should be near 10,000.</p><p><strong>Worked Example:</strong> 234 \u00d7 47</p><pre>       2 3 4\n     \u00d7   4 7\n     -------\n     1 6 3 8    (234 \u00d7 7)\n     9 3 6 0    (234 \u00d7 40)\n     -------\n    11,0 9 8</pre><p><strong>Answer:</strong> 234 \u00d7 47 = <strong>10,998</strong>.</p><p><strong>Tip:</strong> when multiplying by the tens digit, always write a 0 in the ones place before you start to keep place value correct.</p>",
  "mult-decimals": "<h2>Multiply Decimals</h2><p><strong>Two rules:</strong></p><ol><li>Multiply as if there were no decimal points.</li><li>Count the total number of decimal places in both factors \u2014 place the decimal in the product so it has the same total.</li></ol><p><strong>Worked Example:</strong> 2.4 \u00d7 1.3</p><p>Ignore decimals: 24 \u00d7 13 = 312. Total decimal places: 1 + 1 = 2. So 2.4 \u00d7 1.3 = <strong>3.12</strong>.</p><p><strong>Estimate:</strong> 2 \u00d7 1 = 2. Answer 3.12 makes sense (close to 2).</p><p><strong>By powers of 10:</strong> 4.5 \u00d7 100 = 450 (decimal moves 2 places RIGHT). 4.5 \u00f7 100 = 0.045 (decimal moves 2 places LEFT).</p>",
  "div-whole": "<h2>Divide Whole Numbers</h2><p><strong>Long division steps:</strong> Divide, Multiply, Subtract, Bring down (repeat).</p><p><strong>Worked Example:</strong> 936 \u00f7 24</p><p>Estimate first: 936 \u00f7 25 \u2248 37 (since 25 \u00d7 40 = 1,000).</p><pre>       3 9\n    ______\n 24 | 9 3 6\n     7 2\n     ---\n     2 1 6\n     2 1 6\n     ---\n         0</pre><p><strong>Answer:</strong> 936 \u00f7 24 = <strong>39</strong>.</p><p><strong>Partial quotients (friendly numbers):</strong> 936 \u00f7 24 \u2192 24 \u00d7 30 = 720; 936 \u2212 720 = 216; 24 \u00d7 9 = 216; 216 \u2212 216 = 0. Total: 30 + 9 = 39.</p>",
  "div-decimals": "<h2>Divide Decimals</h2><p><strong>Decimal \u00f7 whole number:</strong> divide as usual; keep the decimal point in the same place in the quotient.</p><p><strong>Worked Example:</strong> 5.75 \u00f7 5 = <strong>1.15</strong> (line up the decimal above where it is in the dividend).</p><p><strong>Decimal \u00f7 decimal:</strong> move the decimal in the DIVISOR to make it a whole number. Move it the same number of places in the DIVIDEND. Then divide.</p><p><strong>Example:</strong> 4.8 \u00f7 0.6. Move both decimals 1 place right \u2192 48 \u00f7 6 = <strong>8</strong>.</p><p><strong>Estimate:</strong> 4.8 \u00f7 0.6 \u2248 5 \u00f7 1 = 5. Answer 8 is a bit off \u2014 recheck: 0.6 \u00d7 8 = 4.8 \u2713. The estimate was rough; 8 is correct.</p>",
  "add-sub-fractions": "<h2>Add &amp; Subtract Fractions with Unlike Denominators</h2><p>To add or subtract fractions with different bottoms, first make them the same. Find a <strong>common denominator</strong> (any common multiple; the LCD is smallest).</p><p><strong>Worked Example:</strong> 1/2 + 1/3</p><p>LCD = 6. Rewrite: 1/2 = 3/6; 1/3 = 2/6. Add tops: 3/6 + 2/6 = <strong>5/6</strong>.</p><p><strong>Mixed numbers:</strong> add wholes and fractions separately. 2 1/4 + 1 1/2 = (2+1) + (1/4 + 2/4) = 3 + 3/4 = <strong>3 3/4</strong>.</p><p><strong>Subtracting with regrouping:</strong> 5 \u2212 2 3/8 \u2192 borrow 1 from 5 as 8/8 \u2192 4 8/8 \u2212 2 3/8 = <strong>2 5/8</strong>.</p>",
  "mult-fractions": "<h2>Multiply Fractions</h2><p><strong>Whole \u00d7 fraction:</strong> multiply the whole by the top; keep the bottom. 4 \u00d7 2/3 = 8/3 = <strong>2 2/3</strong>.</p><p><strong>Fraction \u00d7 fraction:</strong> multiply tops together, multiply bottoms together, then simplify. 2/3 \u00d7 3/4 = 6/12 = <strong>1/2</strong>.</p><p><strong>Interpret \"of\" as \"\u00d7\":</strong> \"1/2 of 8\" = 1/2 \u00d7 8 = <strong>4</strong>.</p><p><strong>Mixed numbers:</strong> convert to improper fractions first. 1 1/2 \u00d7 2 1/3 = 3/2 \u00d7 7/3 = 21/6 = <strong>3 1/2</strong>.</p><p><strong>Scaling:</strong> multiplying by a fraction less than 1 makes the number SMALLER. Multiplying by more than 1 makes it LARGER.</p>",
  "div-fractions": "<h2>Divide Fractions</h2><p><strong>Whole \u00f7 unit fraction:</strong> \"How many _/n fit in the whole?\" 3 \u00f7 1/4 = <strong>12</strong> (twelve quarters fit in 3 wholes).</p><p><strong>Unit fraction \u00f7 whole:</strong> \"Split _/n into pieces.\" 1/3 \u00f7 4 = 1/12 (each piece is one-twelfth).</p><p><strong>Keep-Change-Flip:</strong> keep the first fraction, change \u00f7 to \u00d7, flip the second fraction.</p><p><strong>Worked Example:</strong> 1/2 \u00f7 1/4 \u2192 1/2 \u00d7 4/1 = 4/2 = <strong>2</strong>.</p><p><strong>Worked Example:</strong> 5 \u00f7 1/3 \u2192 5 \u00d7 3/1 = <strong>15</strong>.</p><p><strong>Real-world use:</strong> How many 1/4-cup servings in 3 cups? 3 \u00f7 1/4 = 12 servings.</p>",
  "data": "<h2>Represent &amp; Interpret Data</h2><p>A <strong>line plot</strong> uses X marks above a number line to show how often each value occurs. It's great for measurement data with fractions.</p><p><strong>Steps to build:</strong></p><ol><li>List all data values in order.</li><li>Draw a number line covering the range with even spacing.</li><li>Place one X above each value.</li><li>Title the graph and label the axis.</li></ol><p><strong>Interpret data:</strong> Which value has the most Xs? What's the range (largest \u2212 smallest)? What's the total of all values?</p><p><strong>Example use:</strong> lengths of pencils (in eighths of an inch). Redistribute total length evenly across all pencils.</p>",
  "volume": "<h2>Understand Volume Concepts</h2><p><strong>Volume</strong> is the amount of space inside a 3D shape. It's measured in <strong>cubic units</strong> (cm\u00b3, in\u00b3, ft\u00b3).</p><p><strong>Rectangular prism formulas (both work):</strong></p><ul><li>V = length \u00d7 width \u00d7 height</li><li>V = base area \u00d7 height</li></ul><p><strong>Worked Example:</strong> Box is 6 ft \u00d7 4 ft \u00d7 3 ft. Volume = 6 \u00d7 4 \u00d7 3 = <strong>72 ft\u00b3</strong>.</p><p><strong>Composite solids:</strong> break the shape into rectangular prisms, find each volume, and ADD.</p><p><strong>Example:</strong> L-shape solid = prism A (5\u00d74\u00d73 = 60) + prism B (2\u00d74\u00d73 = 24) = <strong>84 units\u00b3</strong>.</p><p><strong>Real-world use:</strong> aquarium capacity, packing crates, storage boxes.</p>",
  "measurement": "<h2>Convert Measurements</h2><p><strong>Customary system:</strong></p><ul><li>Length: 12 in = 1 ft; 3 ft = 1 yd; 5,280 ft = 1 mi</li><li>Weight: 16 oz = 1 lb; 2,000 lb = 1 ton</li><li>Capacity: 8 fl oz = 1 c; 2 c = 1 pt; 2 pt = 1 qt; 4 qt = 1 gal</li></ul><p><strong>Metric system (base-10, easier):</strong></p><ul><li>Length: 10 mm = 1 cm; 100 cm = 1 m; 1,000 m = 1 km</li><li>Mass: 1,000 g = 1 kg</li><li>Capacity: 1,000 mL = 1 L</li></ul><p><strong>Convert bigger \u2192 smaller:</strong> multiply. 5 ft = 5 \u00d7 12 = <strong>60 in</strong>.</p><p><strong>Convert smaller \u2192 bigger:</strong> divide. 350 cm = 350 \u00f7 100 = <strong>3.5 m</strong>.</p>",
  "expressions": "<h2>Numerical Expressions</h2><p><strong>Order of Operations (PEMDAS):</strong></p><ol><li><strong>P</strong>arentheses</li><li><strong>E</strong>xponents</li><li><strong>M</strong>ultiplication and <strong>D</strong>ivision (left to right)</li><li><strong>A</strong>ddition and <strong>S</strong>ubtraction (left to right)</li></ol><p><strong>Worked Example:</strong> 3 \u00d7 (5 + 2) \u2212 4</p><p>Parentheses: 5 + 2 = 7 \u2192 3 \u00d7 7 \u2212 4. Multiply: 3 \u00d7 7 = 21 \u2192 21 \u2212 4 = <strong>17</strong>.</p><p><strong>Write expressions from words:</strong> \"3 times the sum of 5 and 2\" \u2192 3 \u00d7 (5 + 2).</p><p><strong>Nested brackets:</strong> [ 4 + (2 \u00d7 3) ] \u00d7 5. Do the innermost parentheses first: (2 \u00d7 3) = 6; then 4 + 6 = 10; then 10 \u00d7 5 = <strong>50</strong>.</p>",
  "coordinate-plane": "<h2>Coordinate Plane</h2><p>A <strong>coordinate plane</strong> has two axes: the horizontal <em>x-axis</em> and the vertical <em>y-axis</em>. They cross at the <strong>origin</strong> (0, 0).</p><p><strong>Ordered pair (x, y):</strong> the first number tells how far to move RIGHT from the origin; the second tells how far to move UP.</p><p><strong>Worked Example:</strong> Plot (3, 5). Start at origin. Move right 3, then up 5. Place a dot.</p><p><strong>Interpret in real-life:</strong> a graph of time (x) vs distance (y) shows how far something travels over time. The point (2, 60) means at 2 hours, distance is 60 miles.</p><p><strong>First quadrant only:</strong> in 5th grade you work with positive x and y values (upper right region of the plane).</p><p><strong>Distance on axes:</strong> horizontal distance from (2, 3) to (7, 3) is 7 \u2212 2 = <strong>5 units</strong>.</p>",
  "patterns": "<h2>Patterns &amp; Relationships</h2><p>A <strong>numerical pattern</strong> is generated by a rule. Two patterns can be compared to find a relationship between their terms.</p><p><strong>Example:</strong> Rule A: start at 0, add 3. Rule B: start at 0, add 6.</p><pre>A: 0, 3,  6,  9, 12, 15\nB: 0, 6, 12, 18, 24, 30</pre><p><strong>Relationship:</strong> each term in B is 2 \u00d7 the term in A. Written as ordered pairs: (0,0), (3,6), (6,12), (9,18), etc.</p><p><strong>Graph on a coordinate plane:</strong> the points form a straight line, showing the constant ratio.</p><p><strong>Real-world use:</strong> two workers earn $10/hour and $15/hour. After the same number of hours, one always earns 1.5 \u00d7 as much as the other.</p>",
  "geometry-2d": "<h2>Classify Two-Dimensional Figures</h2><p>Shapes are classified by their <strong>properties</strong> \u2014 sides, angles, symmetry.</p><p><strong>Triangles by sides:</strong></p><ul><li>Equilateral: all 3 sides equal</li><li>Isosceles: 2 sides equal</li><li>Scalene: no sides equal</li></ul><p><strong>Triangles by angles:</strong> acute (all &lt; 90\u00b0), right (one = 90\u00b0), obtuse (one &gt; 90\u00b0).</p><p><strong>Quadrilateral hierarchy:</strong></p><ul><li>All squares are rectangles.</li><li>All squares are rhombuses.</li><li>All rectangles are parallelograms.</li><li>All parallelograms are quadrilaterals.</li></ul><p><strong>Worked Example:</strong> A shape with 4 equal sides AND 4 right angles is a SQUARE \u2014 and also a rhombus, rectangle, parallelogram, and quadrilateral (all at once).</p>",
};

let currentUnit = null;

function resourceCardHTML(unit) {
  const phetBtn = unit.phetUrl ? `<a class="btn-phet" href="${unit.phetUrl}" target="_blank">🧪 PhET Simulation</a>` : '';
  const ytBtn = `<a class="btn-yt" href="https://www.youtube.com/results?search_query=${encodeURIComponent(unit.ytSearch)}" target="_blank">▶️ YouTube</a>`;
  const ixlBtn = unit.ixlUrl ? `<a class="btn-ixl" href="${unit.ixlUrl}" target="_blank" rel="noopener">📚 IXL Practice</a>` : '';
  return `<div class="resource-card"><h3>📚 Resources</h3><div class="resource-btns">${phetBtn}${ixlBtn}${ytBtn}</div></div>`;
}

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.onclick = () => showLesson(unit.id);
    card.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-card-icon">${unit.icon}</div>
        <div class="unit-card-meta">
          <div class="unit-card-title">${unit.title}${completedUnits[unit.id]?' ✅':''}</div>
          <div class="unit-card-cc">${unit.cc}</div>
        </div>
      </div>
      <div class="unit-card-desc">${unit.desc}</div>
      <div class="unit-card-pills">
        <div class="pill">📖 Lesson</div>
        <div class="pill">📋 Worksheet</div>
        <div class="pill">▶️ YouTube</div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-content');
  sidebar.innerHTML = '';
  UNITS.forEach((unit, idx) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentUnit === unit.id ? ' active' : '');
    item.textContent = `${idx + 1}. ${unit.title}${completedUnits[unit.id]?' ✅':''}`;
    item.onclick = () => showLesson(unit.id);
    sidebar.appendChild(item);
  });
}

function setTopbar() {
  document.getElementById('topbar-title').textContent = currentUnit ? UNITS.find(u => u.id === currentUnit).title : 'Exploring the World with Math';
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  currentUnit = null;
  renderHome();
  renderSidebar();
  setTopbar();
}

function showLesson(unitId) {
  currentUnit = unitId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === unitId);
  document.getElementById('lesson-content').innerHTML = LESSONS[unitId] + resourceCardHTML(unit);
  renderSidebar();
  setTopbar();
}

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit];
  let html = '';
  ws.forEach((p, idx) => {
    const userAns = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${userAns || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const quiz = QUIZZES[currentUnit];
  let html = `
    <div style="background:#f0f4ff;padding:14px;border-radius:8px;margin-bottom:15px;border-left:4px solid #1B3A8A;">
      <label style="display:block;font-weight:600;color:#1B3A8A;margin-bottom:6px;">Student Name:</label>
      <input type="text" id="student-name" placeholder="Type your full name"
        style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;" />
    </div>
  `;
  quiz.forEach((q, idx) => {
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${q.q}</p>`;
    q.opts.forEach((opt, optIdx) => {
      html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

// Quiz results stored at latest submission so email button can use them.
let lastQuizResults = null;

function submitQuiz() {
  const quiz = QUIZZES[currentUnit];
  const studentName = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  const breakdown = [];
  quiz.forEach((q, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const selectedIdx = selected ? parseInt(selected.value) : -1;
    const isCorrect = selectedIdx === q.ans;
    if (isCorrect) score++;
    breakdown.push({
      n: idx + 1,
      question: q.q,
      studentAnswer: selectedIdx >= 0 ? q.opts[selectedIdx] : '(no answer)',
      correctAnswer: q.opts[q.ans],
      correct: isCorrect
    });
  });
  const percent = Math.round((score / quiz.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');

  const unitObj = UNITS.find(u => u.id === currentUnit);
  const unitTitle = unitObj ? unitObj.title : currentUnit;

  lastQuizResults = { studentName, unitTitle, score, total: quiz.length, pct: percent, breakdown };

  const nameLine = studentName
    ? `<p><strong>Student:</strong> ${studentName}</p>`
    : `<p style="color:#b91c1c;"><em>Tip: type your name on the quiz screen before submitting so Dr. Park knows who you are.</em></p>`;

  document.getElementById('cert-content').innerHTML = `
    <div style="padding: 20px;">
      ${nameLine}
      <p><strong>Unit:</strong> ${unitTitle}</p>
      <p style="font-size: 24px; margin: 20px 0;">Quiz Score: ${score}/${quiz.length} (${percent}%)</p>
      <p>${percent === 100 ? "Perfect! 🌟" : percent >= 67 ? "Nice work! Keep practicing." : "Good try! Review the lesson and try again."}</p>
      <div style="margin-top:18px;">
        <button class="btn" onclick="emailResults()" style="background:#1B3A8A;color:white;padding:10px 18px;font-size:14px;border:none;border-radius:6px;cursor:pointer;">
          📧 Submit Quiz to Dr. Park
        </button>
      </div>
      <p style="margin-top:10px;font-size:12px;color:#666;">
        Tapping the button opens Gmail with the score and answers filled in. Just press Send.
      </p>
    </div>
  `;
  renderSidebar();
  updateProgress();
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const lines = [];
  lines.push(`Aloha Dr. Park,`);
  lines.push(``);
  lines.push(`A 5th-grade math quiz was just submitted.`);
  lines.push(``);
  lines.push(`Student: ${r.studentName || '(name not provided)'}`);
  lines.push(`Unit: ${r.unitTitle}`);
  lines.push(`Score: ${r.score} out of ${r.total} (${r.pct}%)`);
  lines.push(``);
  lines.push(`--- Detailed Answers ---`);
  r.breakdown.forEach(b => {
    lines.push(``);
    lines.push(`Q${b.n}. ${b.question}`);
    lines.push(`   Student's answer: ${b.studentAnswer}`);
    lines.push(`   Correct answer:   ${b.correctAnswer}`);
    lines.push(`   ${b.correct ? '✓ Correct' : '✗ Incorrect'}`);
  });
  lines.push(``);
  lines.push(`Mahalo,`);
  lines.push(`Mary, Star of the Sea School — Grade 5 Math`);

  const subject = `Grade 5 Math Quiz Result — ${r.studentName || 'Student'} — ${r.unitTitle} — ${r.pct}%`;
  const body = lines.join('\n');
  const to = 'ppark@starofthesea.org';

  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&tf=1`
    + `&to=${encodeURIComponent(to)}`
    + `&su=${encodeURIComponent(subject)}`
    + `&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
}

function updateProgress() {
  const completed = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = `${completed}/${UNITS.length}`;
}

function showHandout() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('handout-screen').classList.add('active');
  const h = HANDOUTS_5[currentUnit];
  if (!h) {
    document.getElementById('handout-content').innerHTML = '<p>No handout available for this unit.</p>';
    return;
  }
  const stepsHtml = h.steps.map(s => `<li>${s}</li>`).join('');
  const reflectHtml = h.reflect.map((r,i) => `<li>${r}</li>`).join('');
  const akFile = ANSWER_KEYS_5[currentUnit];
  const answerKeyHtml = akFile ? `
      <div style="background:#E8F5E9;border:2px solid #2E7D32;border-radius:8px;padding:14px;margin:14px 0;">
        <strong style="color:#1B3A8A;">📗 Answer Key (for self-check):</strong>
        <a href="answerkeys/${akFile}" download style="display:inline-block;background:#2E7D32;color:#fff;padding:8px 16px;border-radius:6px;text-decoration:none;font-weight:600;margin:6px 8px 6px 0;">Download ${akFile}</a>
        <div style="font-size:0.9rem;color:#555;margin-top:6px;">Completed workbook with all formulas, charts, and real-world data. Open in Excel or upload to Google Sheets (<em>File → Import → Upload</em>) to compare with your own work after you finish.</div>
      </div>` : '';
  document.getElementById('handout-content').innerHTML = `
    <div class="handout-card">
      <h3>${h.title}</h3>
      <div class="handout-science">${h.science}</div>
      <div class="handout-mission">${h.mission}</div>
      <p><strong>📋 Step-by-Step Instructions</strong></p>
      <ol class="handout-steps">${stepsHtml}</ol>
      <div class="handout-deliverable">
        <strong>🎯 What to Submit:</strong>
        ${h.deliverable}
      </div>
      ${answerKeyHtml}
      <div class="handout-reflect">
        <strong>💭 Reflection Questions:</strong>
        <ol>${reflectHtml}</ol>
      </div>
    </div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  renderHome();
  renderSidebar();
});
  </script>
</body>
</html>

const UNITS = [
  { id:'sci-method', title:"Scientific Method: Repeated Trials", icon:'🔬', cc:'Q1 · Topic 1 · 3.OA.1', q:'Q1', desc:"Scientists repeat experiments in equal groups. Count total trials with multiplication." },

  { id:'rain-snow', title:"Rain & Snow: Equivalent Fractions", icon:'🌧️', cc:'Q4 · Topic 13 · 3.NF.3', q:'Q4', desc:"Compare rainfall in fractions. Show that 1/2 = 2/4 = 4/8." },

const LESSONS = {
  "sci-method": "<h2>🔬 Scientific Method: Repeated Trials</h2><h3>The Science</h3><p>Real scientists don't trust ONE result — they repeat their experiment many times. A FAIR TEST changes only one thing and repeats it. The 6 steps: Question → Hypothesis → Materials → Procedure → Data → Conclusion.</p><h3>Why This Math?</h3><p><strong>Repeating trials creates equal groups.</strong> If you do 5 trials of 3 different balls, that's 5 groups of 3 = <strong>15 total drops</strong>. Multiplication is the fast way to count them without listing every single one.</p><p><strong>Real example:</strong> Test bounce height with 4 balls × 6 drops each = 24 measurements. Skip counting: 6, 12, 18, 24.</p><h3>The Math: Multiplication as Equal Groups</h3><p>4 × 5 means \"4 groups of 5\" or \"5 taken 4 times.\" The two numbers are FACTORS; the answer is the PRODUCT.</p><h3>Vocabulary</h3><ul><li><strong>Hypothesis</strong> — a testable prediction</li><li><strong>Trial</strong> — one run of an experiment</li><li><strong>Data</strong> — the numbers you record</li><li><strong>Equal groups</strong> — groups of the same size (what multiplication counts)</li></ul><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/balancing-act/latest/balancing-act_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">⚖️ Balancing Act →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Form a hypothesis about which side of the seesaw will tip, test it, and record what happens. The scientific method in action.</p>",
  "eng-design": "<h2>⚙️ Engineering Design: Building in Arrays</h2><h3>The Science</h3><p>Engineers follow a design process: Ask, Imagine, Plan, Create, Test, Improve. Real engineers use BLUEPRINTS that are drawn as GRIDS — rows and columns of measurements, parts, or materials.</p><h3>Why This Math?</h3><p><strong>Blueprints are literally arrays.</strong> A brick wall has rows and columns of bricks. A solar panel is a grid of cells. Counting the parts in a design IS multiplication.</p><p><strong>Real example:</strong> A skyscraper has 8 windows per floor × 30 floors = 240 windows. A solar array has 6 rows of 7 panels = 42 panels total.</p><h3>The Math: Multiplication Facts</h3><p>Master facts 0-10 using patterns. Tricks: ×5 ends in 0 or 5; ×10 adds a zero; ×9 finger trick; ×0 = 0; ×1 = itself.</p><h3>Vocabulary</h3><ul><li><strong>Prototype</strong> — a first version of a design</li><li><strong>Blueprint</strong> — a technical drawing of a design</li><li><strong>Array</strong> — objects arranged in rows and columns</li><li><strong>Factor</strong> — a number being multiplied</li></ul><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/area-model-multiplication/latest/area-model-multiplication_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🔲 Area Model Multiplication →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Build multiplication facts as arrays — rows × columns fill a rectangle. Exactly how engineers count parts in a blueprint.</p>",
  "prototypes": "<h2>🧰 Prototypes: Break-Apart Testing</h2><h3>The Science</h3><p>Engineers TEST and IMPROVE prototypes. To find weaknesses, they break a design into SMALL PARTS and test each part. Then they combine results to understand the whole.</p><h3>Why This Math?</h3><p><strong>Break-apart testing is exactly the distributive property.</strong> Instead of solving one hard problem (7 × 8), break it into two easier ones: (5 × 8) + (2 × 8) = 40 + 16 = 56. Engineers do this every day: test 2 sections separately, add the results.</p><p><strong>Real example:</strong> A car has 6 sections × 8 bolts each = 48 bolts. Test 3 sections + 3 sections separately: (3 × 8) + (3 × 8) = 24 + 24 = 48. Same answer, easier work.</p><h3>The Math: Properties of Multiplication</h3><p><strong>Commutative:</strong> 6 × 8 = 8 × 6. Rotating an array doesn't change the total.</p><p><strong>Distributive:</strong> 7 × 8 = (5 × 8) + (2 × 8) = 56. Break big into smaller pieces.</p><p><strong>Associative:</strong> (2 × 3) × 4 = 2 × (3 × 4) = 24. Group any way you like.</p><h3>Try It</h3><p>Compute 8 × 7 three ways: (1) direct fact = 56, (2) rotate: 7 × 8 = 56, (3) break apart: (5×7) + (3×7) = 35 + 21 = 56.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/area-builder/latest/area-builder_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">📐 Area Builder →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Break apart big shapes into smaller ones — hands-on distributive property. Test which arrangements cover the same area.</p>",
  "motion-distance": "<h2>🏎️ Motion & Distance: Divide with Multiplication</h2><h3>The Science</h3><p>MOTION is a change in position. DISTANCE is how far something travels. Objects move because of FORCES.</p><h3>The Math: Division as Unknown Factor</h3><p>Ask: \"What × 4 = 24?\" Answer: 6. So 24 ÷ 4 = 6.</p><p><strong>Example:</strong> A toy car rolls 45 cm in 5 seconds. Speed per second = 45 ÷ 5 = <strong>9 cm/sec</strong>.</p><h3>Vocabulary</h3><ul><li><strong>Motion</strong> — change in position</li><li><strong>Distance</strong> — how far</li><li><strong>Divide</strong> — split into equal parts</li></ul><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/forces-and-motion-basics/latest/forces-and-motion-basics_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🎯 Forces and Motion: Basics →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Push objects with different forces, measure how far they roll, and compute speed. Perfect for the motion-and-division connection.</p>",
  "push-pull": "<h2>💪 Push & Pull: Division Facts</h2><h3>The Science</h3><p>Every force is a PUSH or a PULL. Pushing a swing, pulling a wagon. Bigger force = bigger motion.</p><h3>The Math: Division Facts</h3><p>Master divisions within 100.</p><p><strong>Example:</strong> 6 kids share 48 marbles equally. Each gets 48 ÷ 6 = <strong>8 marbles</strong>.</p><p><strong>Fact family (7, 8, 56):</strong> 7×8=56, 8×7=56, 56÷7=8, 56÷8=7.</p><h3>Vocabulary</h3><ul><li><strong>Force</strong> — push or pull</li><li><strong>Quotient</strong> — answer to a division</li></ul><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/friction/latest/friction_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🔥 PhET Friction →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Watch how surfaces heat up as they rub. Explore why rough surfaces slow motion — a direct push-and-pull sandbox.</p>",
  "track-area": "<h2>📐 Testing Track: Area</h2><h3>The Science</h3><p>Engineers build TEST TRACKS to measure how cars roll. The floor space of a track = its AREA.</p><h3>The Math: Area</h3><p><strong>Area = length × width</strong>. Measured in square units (sq ft, sq m).</p><p><strong>Example:</strong> A track 8 ft × 3 ft has area = 24 sq ft. Cover it with 24 one-foot square tiles.</p><h3>Try It</h3><p>A test track is 12 ft × 4 ft. Area = 12 × 4 = <strong>48 sq ft</strong>.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/area-builder/latest/area-builder_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">📐 Area Builder →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Build rectangles with square tiles and check L × W = area. Try the challenge mode to compare areas and perimeters.</p>",
  "motion-data": "<h2>📊 Motion Data: Graphs & Line Plots</h2><h3>The Science</h3><p>Scientists REPRESENT data in graphs. Bar graphs compare categories. Line plots show how often values happen.</p><h3>The Math: Data</h3><p><strong>Bar graph:</strong> Each bar's height shows a value.</p><p><strong>Line plot:</strong> Stack X marks above each value on a number line.</p><p><strong>Example:</strong> Car A rolls 5 times. Distances (cm): 40, 45, 50, 45, 42. Put X's above each number.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/plinko-probability/latest/plinko-probability_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">📊 Plinko Probability →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Drop balls into a Plinko board and watch a bar-graph histogram fill up in real time. Data visualization in action.</p>",
  "life-cycles": "<h2>🦋 Life Cycles: Add & Subtract Strategies</h2><h3>The Science</h3><p>All living things have a LIFE CYCLE: birth → growth → reproduction → death. Butterflies go egg → caterpillar → chrysalis → adult.</p><h3>The Math: Add/Subtract Strategies</h3><p>Break numbers apart by place value: 268 + 145 = (200+100) + (60+40) + (8+5) = 300 + 100 + 13 = <strong>413</strong>.</p><p><strong>Example:</strong> A colony of 348 caterpillars has 172 turn into butterflies. Remaining = 348 − 172 = 176.</p>",
  "population": "<h2>🐢 Population Change: Fluent Add/Sub within 1,000</h2><h3>The Science</h3><p>A POPULATION is all the members of one species in an area. Populations change due to births, deaths, and migration.</p><h3>The Math: Fluent Addition &amp; Subtraction within 1,000</h3><p><strong>Example:</strong> A sea turtle nest has 92 eggs. Another 128. Total = 220. If 84 hatch and survive, others died.</p><p>Use column addition/subtraction with regrouping.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/natural-selection/latest/natural-selection_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🐰 Natural Selection →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Watch a rabbit population grow, shrink, and change over generations. Adjust food, predators, and climate — great for add/sub within 1,000.</p>",
  "inherited": "<h2>👨‍👩‍👧 Inherited Traits: Multiply by Multiples of 10</h2><h3>The Science</h3><p>Traits pass from parents to babies through GENES. Eye color, height, hair color are INHERITED. Riding a bike is LEARNED.</p><h3>The Math: × 10, × 20, × 30</h3><p><strong>Rule:</strong> Multiply the digits, then add the zero. 6 × 30 = (6 × 3) × 10 = 18 × 10 = 180.</p><p><strong>Example:</strong> A family has 4 generations, each with 20 members. Total = 4 × 20 = 80.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/natural-selection/latest/natural-selection_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🐰 Natural Selection →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">See how fur color (an inherited trait) is passed on. Track which traits survive and reproduce.</p>",
  "hawaiian-eco": "<h2>🌺 Hawaiian Ecosystems: Word Problems</h2><h3>The Science (Hawaiiana)</h3><p>Hawai'i has UNIQUE plants and animals — many found nowhere else. Nēnē (Hawaiian goose), koa trees, honeycreepers, monk seals. Some are ENDEMIC (only in Hawai'i) and ENDANGERED.</p><h3>The Math: Two-Step Word Problems</h3><p><strong>Example:</strong> A koa forest has 6 rows of 8 trees. Wildfire destroys 15. How many remain? (6×8 = 48; 48 − 15 = <strong>33 trees</strong>.)</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/natural-selection/latest/natural-selection_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🌿 Natural Selection →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Introduce a predator (wolf) to see how it changes an ecosystem — mirrors how invasive species affect Hawaiian native populations.</p>",
  "habitat-geometry": "<h2>🏞️ Habitat Geometry: 2D Shapes</h2><h3>The Science</h3><p>HABITATS are shaped by land features. Design an enclosure to protect an animal.</p><h3>The Math: Classify Quadrilaterals</h3><p><strong>Square:</strong> 4 equal sides + 4 right angles.</p><p><strong>Rectangle:</strong> 4 right angles (opposite sides equal).</p><p><strong>Rhombus:</strong> 4 equal sides.</p><p><strong>Trapezoid:</strong> Exactly 1 pair of parallel sides.</p><p><strong>Parallelogram:</strong> 2 pairs of parallel sides.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/area-builder/latest/area-builder_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">🔷 Area Builder →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Build habitats using different quadrilaterals — squares, rectangles, other shapes. Compare which fit best.</p>",
  "cloud-fractions": "<h2>☁️ Cloud Coverage: Understanding Fractions</h2><h3>The Science</h3><p>Meteorologists measure CLOUD COVER — what fraction of the sky is covered. 0/8 = clear. 8/8 = overcast.</p><h3>The Math: Fractions</h3><p>A fraction shows part of a whole. <strong>Numerator</strong> (top) = parts you have. <strong>Denominator</strong> (bottom) = total equal parts.</p><p>3/4 = \"three out of four equal parts.\"</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/fractions-intro/latest/fractions-intro_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">½ Fractions Intro →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Fill cups, cakes, and pizzas to build fractions. Perfect for showing what fraction of the sky is cloudy.</p>",
  "rain-snow": "<h2>🌧️ Rain & Snow: Equivalent Fractions</h2><h3>The Science</h3><p>Rain and snow are types of PRECIPITATION. Compare amounts using fractions.</p><h3>The Math: Fraction Equivalence</h3><p>Two fractions are EQUIVALENT if they show the same amount. 1/2 = 2/4 = 4/8.</p><p><strong>Rule:</strong> Multiply top and bottom by the same number.</p><p><strong>Compare:</strong> Which is bigger, 2/3 or 3/4? Convert to twelfths: 8/12 vs 9/12 → 3/4 wins.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/fraction-matcher/latest/fraction-matcher_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">⚖️ Fraction Matcher →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Match equivalent fractions in a game format. Great for showing 1/2 = 2/4 = 4/8 when comparing rainfall between cities.</p>",
  "rain-measure": "<h2>📏 Weather Measurement: Time, Capacity & Mass</h2><h3>The Science</h3><p>Weather is measured over TIME. Rainfall is measured by CAPACITY (mL, L). Hail can be weighed by MASS (grams).</p><h3>The Math: Measurement</h3><p><strong>1 L = 1,000 mL.</strong> 1 kg = 1,000 g.</p><p><strong>Time:</strong> Elapsed time = end − start.</p><p><strong>Example:</strong> Rain gauge collects 250 mL Mon, 400 mL Tue. Total 650 mL = <strong>0.65 L</strong>.</p>",
  "storm-perimeter": "<h2>🌀 Storm Boundaries: Perimeter</h2><h3>The Science</h3><p>Hurricanes and tornadoes have BOUNDARIES that scientists track on maps. The distance around a shape is its PERIMETER.</p><h3>The Math: Perimeter</h3><p><strong>Perimeter = sum of all sides.</strong></p><p>Rectangle: P = 2(L + W). Square: P = 4 × side.</p><p><strong>Example:</strong> A storm covers a rectangular area 15 mi × 8 mi. Perimeter = 2(15+8) = <strong>46 miles</strong>.</p><h3>🎮 PhET Interactive Simulation</h3><p><a href=\"https://phet.colorado.edu/sims/html/area-builder/latest/area-builder_en.html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#6b46c1;color:#fff;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:700;\">📏 Area Builder →</a></p><p style=\"font-size:0.9rem;color:#555;font-style:italic;margin-top:6px;\">Build storm-region shapes and read off both area AND perimeter — see how storms with the same area can have different boundaries.</p>",
};

const SCIENCE_CONNECTIONS = {
  "sci-method": "<h2>📐 Math Focus: Multiplication as Equal Groups</h2><p><em>Common Core:</em> 3.OA.1, 3.OA.3 &mdash; Understand multiplication as equal groups.</p><h3>Topic 1 — What Multiplication Means</h3><p>4 × 5 means \"4 groups of 5\" OR \"5 taken 4 times.\"</p><h3>Topic 2 — Skip Counting</h3><p>3 × 4 = 4, 8, 12. Multiplication is fast addition of equal groups.</p><h3>Topic 3 — Arrays</h3><p>4 rows × 5 columns = 20 objects.</p><h3>Topic 4 — Vocabulary</h3><p>FACTOR × FACTOR = PRODUCT. In 4 × 5 = 20, the factors are 4 and 5; the product is 20.</p>",
  "eng-design": "<h2>📐 Math Focus: Multiplication Facts</h2><p><em>Common Core:</em> 3.OA.7 &mdash; Fluently multiply within 100.</p><h3>Topic 1 — Multiples of 2, 5, 10</h3><p>×2 = double. ×5 ends in 0 or 5. ×10 adds a zero.</p><h3>Topic 2 — Multiples of 3, 4, 6</h3><p>×3 is triple. ×4 is double-double. ×6 is × 2 × 3.</p><h3>Topic 3 — Multiples of 7, 8, 9</h3><p>×9 finger trick: fold the finger for the multiplier; count fingers left of fold = tens, right = ones.</p><h3>Topic 4 — Try It</h3><p>Compute: 6×7=42, 8×9=72, 7×4=28.</p>",
  "prototypes": "<h2>📐 Math Focus: Properties of Multiplication</h2><p><em>Common Core:</em> 3.OA.5 &mdash; Apply properties.</p><h3>Topic 1 — Commutative Property</h3><p>4 × 5 = 5 × 4. Order doesn't matter.</p><h3>Topic 2 — Distributive Property</h3><p>7 × 8 = (5 × 8) + (2 × 8) = 40 + 16 = 56. Break apart to make easier.</p><h3>Topic 3 — Associative Property</h3><p>2 × 3 × 4 = (2×3) × 4 = 6 × 4 = 24 OR 2 × (3×4) = 2 × 12 = 24. Group either way.</p><h3>Topic 4 — Identity &amp; Zero</h3><p>×1 = itself. ×0 = 0.</p>",
  "motion-distance": "<h2>📐 Math Focus: Division as Unknown-Factor Multiplication</h2><p><em>Common Core:</em> 3.OA.6 &mdash; Understand division as unknown factor.</p><h3>Topic 1 — Division = Missing Factor</h3><p>24 ÷ 6 means \"what × 6 = 24?\" Answer: 4.</p><h3>Topic 2 — Fact Family</h3><p>For (4, 6, 24): 4×6=24, 6×4=24, 24÷4=6, 24÷6=4.</p><h3>Topic 3 — Speed</h3><p>Speed = distance ÷ time. Car rolls 45 cm in 5 sec → speed = 9 cm/sec.</p>",
  "push-pull": "<h2>📐 Math Focus: Division Facts</h2><p><em>Common Core:</em> 3.OA.7 &mdash; Fluent division within 100.</p><h3>Topic 1 — Sharing (Partitive)</h3><p>24 ÷ 4: 24 shared among 4 → each gets 6.</p><h3>Topic 2 — Grouping (Quotative)</h3><p>24 ÷ 4: 24 in groups of 4 → 6 groups.</p><h3>Topic 3 — Zero &amp; One</h3><p>Any number ÷ 1 = itself. Any number ÷ itself = 1. Cannot ÷ 0.</p><h3>Topic 4 — Remainders</h3><p>25 ÷ 4 = 6 remainder 1. (6 × 4 = 24; 25 − 24 = 1.)</p>",
  "track-area": "<h2>📐 Math Focus: Area of Rectangles</h2><p><em>Common Core:</em> 3.MD.5-7 &mdash; Area.</p><h3>Topic 1 — Area by Counting Squares</h3><p>Cover a rectangle with unit squares. Count them.</p><h3>Topic 2 — Area = L × W</h3><p>5 × 3 = 15 sq units. Multiplication is faster than counting.</p><h3>Topic 3 — Missing Side</h3><p>Area = 24, L = 6 → W = 24 ÷ 6 = 4.</p><h3>Topic 4 — Distributive Area</h3><p>L-shape: split into two rectangles, add areas.</p>",
  "motion-data": "<h2>📐 Math Focus: Data &amp; Graphs</h2><p><em>Common Core:</em> 3.MD.3-4 &mdash; Scaled graphs; line plots.</p><h3>Topic 1 — Bar Graphs</h3><p>Bars compare categories. Height = value.</p><h3>Topic 2 — Line Plots</h3><p>X marks above a number line. Mode = tallest stack.</p><h3>Topic 3 — Scaled Graphs</h3><p>Choose scale (1, 2, 5, 10) to fit data.</p><h3>Topic 4 — Range</h3><p>Range = max − min.</p>",
  "life-cycles": "<h2>📐 Math Focus: Add &amp; Subtract Strategies</h2><p><em>Common Core:</em> 3.NBT.2 &mdash; Add &amp; subtract with strategies.</p><h3>Topic 1 — Break Apart by Place Value</h3><p>468 + 235 = (400+200) + (60+30) + (8+5) = 600 + 90 + 13 = 703.</p><h3>Topic 2 — Compensation</h3><p>398 + 25 = 400 + 25 − 2 = 423.</p><h3>Topic 3 — Counting On/Back</h3><p>530 − 175: 175 + 25 = 200; 200 + 300 = 500; 500 + 30 = 530. So 25 + 300 + 30 = 355.</p>",
  "population": "<h2>📐 Math Focus: Fluent Add/Subtract within 1,000</h2><p><em>Common Core:</em> 3.NBT.2 &mdash; Fluent add/sub within 1,000.</p><h3>Topic 1 — Column Addition</h3><p>Align by place value. Regroup when column ≥ 10.</p><h3>Topic 2 — Column Subtraction</h3><p>Regroup by borrowing.</p><h3>Topic 3 — Checking</h3><p>Add to check subtraction: 348 − 172 = 176; check: 176 + 172 = 348 ✓.</p>",
  "inherited": "<h2>📐 Math Focus: Multiply by Multiples of 10</h2><p><em>Common Core:</em> 3.NBT.3 &mdash; × multiples of 10.</p><h3>Topic 1 — The Zero Trick</h3><p>× 10 → add a zero. 7 × 10 = 70.</p><h3>Topic 2 — Break Apart</h3><p>6 × 40 = 6 × 4 × 10 = 24 × 10 = 240.</p><h3>Topic 3 — × 100 &amp; × 1,000</h3><p>× 100 = add 2 zeros. × 1,000 = add 3 zeros.</p>",
  "hawaiian-eco": "<h2>📐 Math Focus: Word Problems (All Operations)</h2><p><em>Common Core:</em> 3.OA.8 &mdash; Two-step word problems.</p><h3>Topic 1 — Read Carefully</h3><p>Identify what's given and what's asked.</p><h3>Topic 2 — Choose Operations</h3><p>\"Total\" = add. \"Left\" = subtract. \"Groups\" = multiply. \"Share\" = divide.</p><h3>Topic 3 — Two-Step Problems</h3><p>Step 1: find intermediate value. Step 2: use it to answer the question.</p>",
  "habitat-geometry": "<h2>📐 Math Focus: Classify 2D Shapes</h2><p><em>Common Core:</em> 3.G.1 &mdash; Classify shapes by attributes.</p><h3>Topic 1 — Attributes</h3><p>Sides, angles (right vs not), parallel sides.</p><h3>Topic 2 — Quadrilateral Family</h3><p>Square ⊂ Rectangle ⊂ Parallelogram ⊂ Quadrilateral.</p><h3>Topic 3 — Special Quadrilaterals</h3><p>Square, Rectangle, Rhombus, Parallelogram, Trapezoid.</p>",
  "cloud-fractions": "<h2>📐 Math Focus: Fractions as Numbers</h2><p><em>Common Core:</em> 3.NF.1-2 &mdash; Fractions.</p><h3>Topic 1 — Parts of a Whole</h3><p>3/4 = 3 of 4 equal parts.</p><h3>Topic 2 — Number Line</h3><p>Divide 0-1 into equal ticks. Locate fractions.</p><h3>Topic 3 — Fractions of a Group</h3><p>12 items, 3 red → 3/12 = 1/4.</p>",
  "rain-snow": "<h2>📐 Math Focus: Fraction Equivalence &amp; Comparison</h2><p><em>Common Core:</em> 3.NF.3 &mdash; Equivalence.</p><h3>Topic 1 — Equivalent Fractions</h3><p>1/2 = 2/4 = 3/6 = 4/8. Multiply top and bottom by same number.</p><h3>Topic 2 — Simplifying</h3><p>6/8: divide top and bottom by 2 → 3/4.</p><h3>Topic 3 — Comparing</h3><p>Same denominator → bigger numerator wins. Same numerator → smaller denominator wins.</p>",
  "rain-measure": "<h2>📐 Math Focus: Time, Capacity &amp; Mass</h2><p><em>Common Core:</em> 3.MD.1-2 &mdash; Time; liquid volumes; masses.</p><h3>Topic 1 — Time (elapsed)</h3><p>End − Start = elapsed time. Use a number line to jump.</p><h3>Topic 2 — Capacity</h3><p>1 L = 1,000 mL. Add capacities directly.</p><h3>Topic 3 — Mass</h3><p>1 kg = 1,000 g.</p>",
  "storm-perimeter": "<h2>📐 Math Focus: Perimeter</h2><p><em>Common Core:</em> 3.MD.8 &mdash; Perimeter.</p><h3>Topic 1 — Sum of All Sides</h3><p>Perimeter = add all sides.</p><h3>Topic 2 — Rectangle Shortcut</h3><p>P = 2(L + W). For square: P = 4 × side.</p><h3>Topic 3 — Missing Side</h3><p>P = 20 cm, L = 6 → 2(6 + W) = 20 → W = 4.</p><h3>Topic 4 — Same Perimeter, Different Area</h3><p>Two shapes with equal perimeter can have different area.</p>",
};

let currentUnit = null;
let lastQuizResults = null;

function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = UNITS.map(u => `
    <div class="unit-card" onclick="showLesson('${u.id}')">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-cc">${u.cc}</div>
      <div class="unit-title">${u.title}</div>
      <div class="unit-desc">${u.desc}</div>
    </div>
  `).join('');
  let sbHTML = '';
  let lastQ = '';
  const Q_LABELS = {
    'Q1': 'Q1 · Engineering & Tech',
    'Q2': 'Q2 · Physical Science',
    'Q3': 'Q3 · Life Science',
    'Q4': 'Q4 · Earth & Space'
  };
  UNITS.forEach(u => {
    if (u.q !== lastQ) {
      sbHTML += `<div class="sidebar-quarter">${Q_LABELS[u.q] || u.q}</div>`;
      lastQ = u.q;
    }
    const done = completedUnits[u.id] ? 'completed' : '';
    sbHTML += `<div class="sidebar-unit ${done}" onclick="showLesson('${u.id}')">${u.icon} ${u.title}</div>`;
  });
  document.getElementById('sidebar-content').innerHTML = sbHTML;
  const done = Object.keys(completedUnits).length;
  document.getElementById('progress-text').textContent = done + '/' + UNITS.length;
}

function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
  renderHome();
}

function showLesson(uid) {
  currentUnit = uid;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lesson-screen').classList.add('active');
  document.getElementById('lesson-content').innerHTML = LESSONS[uid] || '<p>Lesson coming soon.</p>';
}

function showLab() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('lab-screen').classList.add('active');
  const l = HANDOUTS_5[currentUnit];
  if (!l) { document.getElementById('lab-content').innerHTML = '<p>Lab coming soon.</p>'; return; }
  const steps = l.steps.map(s => `<li>${s}</li>`).join('');
  const reflect = l.reflect.map(r => `<li>${r}</li>`).join('');
  document.getElementById('lab-content').innerHTML = `
    <div class="handout-card">
      <h3>${l.title}</h3>
      <div style="font-size:0.9rem;color:#666;margin-bottom:6px;">${l.science}</div>
      <div class="handout-mission">${l.mission}</div>
      <strong>Steps:</strong><ol class="handout-steps">${steps}</ol>
      <strong>Deliverable:</strong> ${l.deliverable}
      <div class="handout-reflect"><strong>Reflect:</strong><ol>${reflect}</ol></div>
    </div>`;
}

function showMathFocus() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('science-screen').classList.add('active');
  document.getElementById('science-content').innerHTML = SCIENCE_CONNECTIONS[currentUnit] || '<p>Math Focus coming soon.</p>';
}

const _sectionHeader = (idx) => {
  if (idx === 0)  return '<div class="section-banner section-math">🧮 Part 1 &mdash; Math Questions <span>(10 problems)</span></div>';
  if (idx === 10) return '<div class="section-banner section-science">🔬 Part 2 &mdash; Science Questions <span>(10 problems)</span></div>';
  return '';
};

function showWorksheet() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('worksheet-screen').classList.add('active');
  const ws = WORKSHEETS[currentUnit] || [];
  let html = '';
  ws.forEach((p, idx) => {
    html += _sectionHeader(idx);
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><textarea id="ans-${idx}" placeholder="Your answer..."></textarea></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function checkWorksheet() {
  const ws = WORKSHEETS[currentUnit] || [];
  let html = '';
  ws.forEach((p, idx) => {
    html += _sectionHeader(idx);
    const user = document.getElementById(`ans-${idx}`).value;
    html += `<div class="problem"><h4>Problem ${idx + 1}</h4><p>${p.q}</p><div class="answer-key"><strong>Answer:</strong> ${p.answer}</div><p><strong>Your answer:</strong> ${user || '(no answer)'}</p></div>`;
  });
  document.getElementById('worksheet-content').innerHTML = html;
}

function showQuiz() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz-screen').classList.add('active');
  const q = QUIZZES[currentUnit] || [];
  let html = '';
  q.forEach((qq, idx) => {
    html += _sectionHeader(idx);
    html += `<div class="quiz-question"><h4>Question ${idx + 1}</h4><p>${qq.q}</p>`;
    qq.opts.forEach((opt, i) => {
      html += `<label><input type="radio" name="q${idx}" value="${i}"> ${opt}</label>`;
    });
    html += `</div>`;
  });
  document.getElementById('quiz-content').innerHTML = html;
}

function submitQuiz() {
  const q = QUIZZES[currentUnit] || [];
  const name = (document.getElementById('student-name')?.value || '').trim();
  let score = 0;
  q.forEach((qq, idx) => {
    const sel = document.querySelector(`input[name="q${idx}"]:checked`);
    if (sel && parseInt(sel.value) === qq.ans) score++;
  });
  const pct = Math.round((score / q.length) * 100);
  completedUnits[currentUnit] = true;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('certificate-screen').classList.add('active');
  const unit = UNITS.find(u => u.id === currentUnit);
  lastQuizResults = { studentName: name, unitTitle: unit ? unit.title : currentUnit, score, total: q.length, pct };
  document.getElementById('cert-content').innerHTML = `
    <p style="font-size:1.1rem;margin:16px 0;"><strong>${name || 'Student'}</strong></p>
    <p>completed <strong>${unit ? unit.title : currentUnit}</strong></p>
    <p style="font-size:1.4rem;color:${pct >= 70 ? '#4a8c3a' : '#c62828'};margin:16px 0;"><strong>${score} / ${q.length} correct (${pct}%)</strong></p>`;
}

function emailResults() {
  if (!lastQuizResults) return;
  const r = lastQuizResults;
  const body = `Hello Mrs. Won,%0D%0A%0D%0A${r.studentName || 'A student'} completed the ${r.unitTitle} quiz.%0D%0A%0D%0AScore: ${r.score}/${r.total} (${r.pct}%%)%0D%0A%0D%0AThank you.`;
  window.location.href = `https://mail.google.com/mail/?view=cm&fs=1&tf=1&to=ewon@starofthesea.org&su=${encodeURIComponent(r.unitTitle + ' Quiz Result')}&body=${body}`;
}

renderHome();
</script>
